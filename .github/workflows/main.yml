name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './my-app/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./my-app

      - name: Security Audit
        run: npm audit --audit-level=high
        working-directory: ./my-app

      - name: Build Astro Site
        run: npm run build
        working-directory: ./my-app
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}

      - name: Terraform Security Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.69.3 
        with:
          scan-type: 'config'
          scan-ref: './terraform-config'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          trivy-config: trivy.yaml

      - name: Upload to s3
        run: aws s3 sync ./my-app/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/" "/blog" "/blog/*" "/404.html"

      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@b716ccb6645355dd9fcce8002ce460e5474f7f00 # v4
        with:
          url: https://${{ secrets.DOMAIN_NAME }}|https://${{ secrets.DOMAIN_NAME }}/blog

          follow-redirect: false 
          max-attempts: 3 
          retry-delay: 5s 
          retry-all: false 
